<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>StarShots</title>

  <style>
    :root {
      color-scheme: light dark;

      --bg: #f5f5f7;
      --bg-accent: rgba(10, 132, 255, 0.10);
      --card: rgba(255, 255, 255, 0.84);
      --card-solid: #ffffff;
      --field: #ffffff;
      --text: #111318;
      --muted: #6b7280;
      --border: rgba(17, 24, 39, 0.08);
      --accent: #0a84ff;
      --accent-2: #0077ed;
      --accent-soft: rgba(10, 132, 255, 0.14);
      --danger: #e5484d;
      --danger-soft: rgba(229, 72, 77, 0.14);
      --success: #11845b;
      --info: #6b7280;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);

      --secondary-btn-top: rgba(255, 255, 255, 0.98);
      --secondary-btn-bottom: rgba(238, 239, 242, 0.98);
      --secondary-btn-border: rgba(17, 24, 39, 0.08);

      --logo-invert: 1;
      --logo-panel: #ffffff;

      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0d12;
        --bg-accent: rgba(88, 166, 255, 0.12);
        --card: rgba(18, 20, 26, 0.84);
        --card-solid: #12141a;
        --field: #171a21;
        --text: #f5f7fb;
        --muted: #a1a7b3;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #3a9bff;
        --accent-2: #197cff;
        --accent-soft: rgba(88, 166, 255, 0.18);
        --danger: #ff6b70;
        --danger-soft: rgba(255, 107, 112, 0.18);
        --success: #4dd4a0;
        --info: #a1a7b3;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.42);

        --secondary-btn-top: rgba(255, 255, 255, 0.12);
        --secondary-btn-bottom: rgba(255, 255, 255, 0.08);
        --secondary-btn-border: rgba(255, 255, 255, 0.08);

        --logo-invert: 0;
        --logo-panel: #000000;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, var(--bg-accent), transparent 28%),
        radial-gradient(circle at top right, rgba(52, 199, 89, 0.08), transparent 20%),
        var(--bg);
      overflow-x: hidden;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex: 0 0 auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      user-select: none;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--logo-panel);
      border: 1px solid var(--border);
      box-shadow:
        0 1px 1px rgba(255, 255, 255, 0.45) inset,
        0 8px 20px rgba(15, 23, 42, 0.08);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: invert(var(--logo-invert)) grayscale(1) contrast(1.08);
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      line-height: 1;
    }

    .grid {
      flex: 1 1 auto;
      display: grid;
      gap: 14px;
      min-height: 0;
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .form-panel,
    .preview-panel {
      min-height: 0;
    }

    .form-layout {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 12px;
    }

    .form-main {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .form-bottom {
      margin-top: auto;
      padding-top: 4px;
    }

    .dual {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: block;
    }

    .field > span {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .required {
      color: var(--accent);
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--border);
      background: var(--field);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      line-height: 1.35;
      transition:
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.16s ease,
        background 0.16s ease,
        opacity 0.16s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9aa0a6;
    }

    select {
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 3px),
        calc(100% - 14px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      cursor: pointer;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    input:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .links-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      border: 1px solid var(--border);
      background: var(--field);
      border-radius: 22px;
      padding: 12px;
      transition:
        opacity 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        transform 0.16s ease;
    }

    .link-card.off {
      opacity: 0.56;
    }

    .link-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .link-meta {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(127, 127, 127, 0.10);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .link-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .link-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .switch {
      position: relative;
      width: 56px;
      height: 34px;
      display: inline-block;
      flex-shrink: 0;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background 0.18s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.10);
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      left: 3px;
      top: 3px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.16);
      transition: transform 0.18s ease;
    }

    .switch input:checked + .slider {
      background: var(--accent);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition:
        transform 0.15s ease,
        opacity 0.15s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-action {
      width: 100%;
      min-height: 52px;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-align: center;
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 10px 24px rgba(10, 132, 255, 0.26);
    }

    .btn-secondary {
      color: var(--text);
      border: 1px solid var(--secondary-btn-border);
      background: linear-gradient(
        180deg,
        var(--secondary-btn-top),
        var(--secondary-btn-bottom)
      );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        0 8px 20px rgba(15, 23, 42, 0.05);
    }

    .btn-ghost {
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      white-space: nowrap;
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
    }

    .status[data-state="error"] {
      color: var(--danger);
    }

    .status[data-state="success"] {
      color: var(--success);
    }

    .status[data-state="info"] {
      color: var(--info);
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .mode-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--field);
      border: 1px solid var(--border);
      min-width: 250px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .mode-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .mode-switch label {
      padding: 10px 14px;
      text-align: center;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition:
        background 0.16s ease,
        color 0.16s ease,
        box-shadow 0.16s ease;
    }

    .mode-switch input:checked + label {
      background: var(--card-solid);
      color: var(--text);
      box-shadow:
        0 1px 1px rgba(0, 0, 0, 0.04),
        0 6px 16px rgba(0, 0, 0, 0.06);
    }

    .preview-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #output {
      flex: 1 1 auto;
      min-height: 260px;
      resize: none;
      background: var(--field);
    }

    .invalid {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 4px var(--danger-soft) !important;
    }

    .shake {
      animation: jiggle 0.28s ease;
    }

    @keyframes jiggle {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    @media (max-width: 839px), (max-aspect-ratio: 1/1) {
      .grid {
        grid-template-columns: 1fr;
      }

      .dual {
        grid-template-columns: 1fr;
      }

      .mode-switch {
        width: 100%;
        min-width: 0;
      }

      .preview-head {
        align-items: stretch;
      }

      .btn-ghost {
        width: 100%;
      }

      #output {
        min-height: 320px;
      }
    }

    @media (min-width: 840px) and (min-aspect-ratio: 1/1) {
      body {
        overflow: hidden;
      }

      .shell {
        height: 100dvh;
      }

      .grid {
        grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr);
        align-items: stretch;
        min-height: 0;
      }

      .card {
        height: 100%;
      }

      #output {
        min-height: 0;
      }
    }

    @media (min-width: 840px) and (min-aspect-ratio: 1/1) and (max-height: 860px) {
      .shell {
        padding: 12px;
        gap: 10px;
      }

      .card {
        padding: 13px;
      }

      .link-card {
        padding: 10px;
      }

      input[type="text"],
      select,
      textarea {
        padding: 11px 13px;
        font-size: 14px;
      }

      .btn-action {
        min-height: 46px;
        padding: 11px 16px;
      }

      .preview-head {
        margin-bottom: 10px;
      }

      .link-top {
        margin-bottom: 8px;
      }

      .dual,
      .grid,
      .links-group,
      .actions {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand" aria-label="StarShots">
        <div class="brand-mark">
          <img src="starshots-logo.png" alt="StarShots logo" />
        </div>
        <div class="brand-name">STARSHOTS</div>
      </div>
    </header>

    <div class="grid">
      <section class="card form-panel">
        <form id="generatorForm" class="form-layout" novalidate>
          <div class="form-main">
            <div class="dual">
              <label class="field">
                <span>Title <span class="required">*</span></span>
                <select id="title" autocomplete="honorific-prefix">
                  <option value="" selected>Select title</option>
                  <option value="Mr.">Mr.</option>
                  <option value="Ms.">Ms.</option>
                </select>
              </label>

              <label class="field">
                <span>Name <span class="required">*</span></span>
                <input
                  id="name"
                  type="text"
                  placeholder="Client name"
                  autocapitalize="words"
                  autocomplete="name"
                  enterkeyhint="done"
                />
              </label>
            </div>

            <div class="links-group" id="linksGroup">
              <div class="link-card" id="gdRow">
                <div class="link-top">
                  <div class="link-meta">
                    <div class="chip">GD</div>
                    <div>
                      <div class="link-name">Google Drive</div>
                      <div class="link-note">Available for up to 1 year</div>
                    </div>
                  </div>

                  <label class="switch" aria-label="Toggle Google Drive">
                    <input id="gdToggle" type="checkbox" checked />
                    <span class="slider"></span>
                  </label>
                </div>

                <input
                  id="gdLink"
                  type="text"
                  placeholder="https://..."
                  spellcheck="false"
                  autocapitalize="off"
                  autocomplete="off"
                  inputmode="url"
                  enterkeyhint="done"
                />
              </div>

              <div class="link-card" id="dbRow">
                <div class="link-top">
                  <div class="link-meta">
                    <div class="chip">DB</div>
                    <div>
                      <div class="link-name">Dropbox</div>
                      <div class="link-note">Available for up to 2 weeks</div>
                    </div>
                  </div>

                  <label class="switch" aria-label="Toggle Dropbox">
                    <input id="dbToggle" type="checkbox" checked />
                    <span class="slider"></span>
                  </label>
                </div>

                <input
                  id="dbLink"
                  type="text"
                  placeholder="https://..."
                  spellcheck="false"
                  autocapitalize="off"
                  autocomplete="off"
                  inputmode="url"
                  enterkeyhint="done"
                />
              </div>

              <div class="link-card" id="tnRow">
                <div class="link-top">
                  <div class="link-meta">
                    <div class="chip">TN</div>
                    <div>
                      <div class="link-name">TransferNow</div>
                      <div class="link-note">Available for up to 7 days</div>
                    </div>
                  </div>

                  <label class="switch" aria-label="Toggle TransferNow">
                    <input id="tnToggle" type="checkbox" checked />
                    <span class="slider"></span>
                  </label>
                </div>

                <input
                  id="tnLink"
                  type="text"
                  placeholder="https://..."
                  spellcheck="false"
                  autocapitalize="off"
                  autocomplete="off"
                  inputmode="url"
                  enterkeyhint="done"
                />
              </div>
            </div>
          </div>

          <div class="form-bottom">
            <div class="actions">
              <button class="btn-action btn-primary" id="okBtn" type="submit">OK</button>
              <button class="btn-action btn-secondary" id="clearBtn" type="button">Clear</button>
            </div>
            <div class="status" id="status" aria-live="polite"></div>
          </div>
        </form>
      </section>

      <section class="card preview-panel">
        <div class="preview-head">
          <div class="mode-switch" role="radiogroup" aria-label="Output format">
            <input type="radio" id="modeWhatsapp" name="mode" value="whatsapp" checked />
            <label for="modeWhatsapp">WhatsApp</label>

            <input type="radio" id="modeInstagram" name="mode" value="instagram" />
            <label for="modeInstagram">Instagram</label>
          </div>

          <button class="btn-ghost" id="copyBtn" type="button">Copy</button>
        </div>

        <div class="preview-body">
          <textarea
            id="output"
            readonly
            placeholder="Your generated message will appear here..."
          ></textarea>
        </div>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById("generatorForm");
    const titleInput = document.getElementById("title");
    const nameInput = document.getElementById("name");
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const okBtn = document.getElementById("okBtn");
    const linksGroup = document.getElementById("linksGroup");

    let hasGenerated = false;
    let lastGeneratedData = null;
    let isDirtyAfterGenerate = false;

    // Search this line and replace the value with your NEW token
    const SHORTENING_ENABLED = true;
    const HELINK_API_KEY = "hlk_L3QHIGI8rs69cLMVuO4GewsaW6BOOshcbhQf3Tug";
    const HELINK_ENDPOINT = "https://hel.ink/api/shorten";

    const linkItems = [
      {
        key: "gd",
        label: "Google Drive",
        noteWhatsapp: "_available for up to 1 year_",
        noteInstagram: "Available for up to 1 year",
        row: document.getElementById("gdRow"),
        toggle: document.getElementById("gdToggle"),
        input: document.getElementById("gdLink")
      },
      {
        key: "db",
        label: "Dropbox",
        noteWhatsapp: "_available for up to 2 weeks_",
        noteInstagram: "Available for up to 2 weeks",
        row: document.getElementById("dbRow"),
        toggle: document.getElementById("dbToggle"),
        input: document.getElementById("dbLink")
      },
      {
        key: "tn",
        label: "TransferNow",
        noteWhatsapp: "_available for up to 7 days_",
        noteInstagram: "Available for up to 7 days",
        row: document.getElementById("tnRow"),
        toggle: document.getElementById("tnToggle"),
        input: document.getElementById("tnLink")
      }
    ];

    function setStatus(message = "", state = "") {
      statusEl.textContent = message;
      statusEl.dataset.state = state;
    }

    function updateLinkState(item) {
      const on = item.toggle.checked;
      item.row.classList.toggle("off", !on);
      item.input.disabled = !on;
      item.input.placeholder = on ? "https://..." : "Turn on to use this link";
    }

    function clearInvalid(el) {
      el.classList.remove("invalid", "shake");
    }

    function markInvalid(el) {
      el.classList.remove("shake");
      el.classList.add("invalid");
      void el.offsetWidth;
      el.classList.add("shake");
      setTimeout(() => el.classList.remove("shake"), 320);
    }

    function clearLinkGroupError() {
      clearInvalid(linksGroup);
      linkItems.forEach((item) => {
        clearInvalid(item.row);
        clearInvalid(item.input);
      });
    }

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function looksLikeDomainOrUrl(value) {
      const v = value.trim();
      if (!v) return false;

      if (/^https?:\/\//i.test(v)) return true;
      return /^(?:[a-z0-9-]+\.)+[a-z]{2,}(?:[/:?#][^\s]*)?$/i.test(v);
    }

    function normalizeUrl(value) {
      let v = value.trim();
      if (!v) return "";

      if (!/^https?:\/\//i.test(v)) {
        if (looksLikeDomainOrUrl(v)) {
          v = "https://" + v;
        }
      }

      try {
        const parsed = new URL(v);

        if (!/^https?:$/i.test(parsed.protocol)) return null;
        if (!parsed.hostname || !parsed.hostname.includes(".")) return null;

        return parsed.toString();
      } catch {
        return null;
      }
    }

    function buildMessageWithFinalUrls({ title, name, mode, processedLinks }) {
      const fullName = `${title} ${name}`.replace(/\s+/g, " ").trim();

      const lines = [
        `Hello, ${fullName}!`,
        "",
        "Here are your files:",
        ""
      ];

      processedLinks.forEach((item, index) => {
        if (mode === "whatsapp") {
          lines.push(`*${item.label}*`);
          lines.push(item.noteWhatsapp);
          lines.push(item.finalUrl);
        } else {
          lines.push(item.label);
          lines.push(item.noteInstagram);
          lines.push(item.finalUrl);
        }

        if (index !== processedLinks.length - 1) {
          lines.push("");
        }
      });

      lines.push("");
      lines.push("Please kindly download the files within the availability period stated above.");
      lines.push("Let me know if you need anything else.");

      return lines.join("\n");
    }

    function markOutputDirty() {
      if (!hasGenerated) return;
      isDirtyAfterGenerate = true;
      setStatus("Content changed. Press OK to regenerate and copy.", "info");
    }

    function regeneratePreviewFromLastGenerated() {
      if (!hasGenerated || !lastGeneratedData) return;

      output.value = buildMessageWithFinalUrls({
        title: lastGeneratedData.title,
        name: lastGeneratedData.name,
        mode: getMode(),
        processedLinks: lastGeneratedData.processedLinks
      });

      if (isDirtyAfterGenerate) {
        setStatus("Format changed for the last generated message. Press OK to apply new edits and copy.", "info");
      } else {
        setStatus("Format updated. Press OK if you want to copy again.", "info");
      }
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (err) {
        try {
          output.focus();
          output.select();
          output.setSelectionRange(0, output.value.length);
          const copied = document.execCommand("copy");
          window.getSelection()?.removeAllRanges?.();
          output.blur();
          return copied;
        } catch {
          return false;
        }
      }
    }

    function pulseButton(button, tempText) {
      const original = button.dataset.originalText || button.textContent;
      button.dataset.originalText = original;
      button.textContent = tempText;
      setTimeout(() => {
        button.textContent = original;
      }, 1200);
    }

    async function shortenUrlWithHelink(longUrl) {
      if (!HELINK_API_KEY || HELINK_API_KEY === "PASTE_NEW_KEY_HERE") {
        throw new Error("Please add your new hel.ink API key first.");
      }

      const response = await fetch(HELINK_ENDPOINT, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${HELINK_API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          url: longUrl
        })
      });

      let data = null;
      try {
        data = await response.json();
      } catch {
        throw new Error("hel.ink returned an invalid response.");
      }

      if (!response.ok || !data?.success) {
        throw new Error(
          data?.message ||
          data?.error ||
          `hel.ink request failed (${response.status})`
        );
      }

      const shortUrl = data?.data?.url;

      if (!shortUrl) {
        throw new Error("hel.ink did not return a shortened URL.");
      }

      return shortUrl;
    }

    async function processLinksBeforeMessage(activeLinks) {
      if (!SHORTENING_ENABLED) {
        return activeLinks.map((item) => ({
          ...item,
          finalUrl: item.longUrl
        }));
      }

      setStatus("Shortening links...", "info");

      const processed = [];

      for (const item of activeLinks) {
        const shortUrl = await shortenUrlWithHelink(item.longUrl);
        processed.push({
          ...item,
          finalUrl: shortUrl
        });
      }

      return processed;
    }

    async function generateAndCopy() {
      setStatus("");
      clearInvalid(titleInput);
      clearInvalid(nameInput);
      clearLinkGroupError();

      const hadGeneratedBefore = hasGenerated;
      const title = titleInput.value.trim();
      const name = nameInput.value.trim();

      let firstInvalid = null;

      if (!title) {
        markInvalid(titleInput);
        firstInvalid = firstInvalid || titleInput;
      }

      if (!name) {
        markInvalid(nameInput);
        firstInvalid = firstInvalid || nameInput;
      }

      if (firstInvalid) {
        if (!hadGeneratedBefore) output.value = "";
        setStatus("Please fill in Title and Name.", "error");
        firstInvalid.focus();
        return;
      }

      const normalizedMap = new Map();
      let invalidLinkInput = null;

      for (const item of linkItems) {
        const raw = item.input.value.trim();
        if (!raw) continue;

        const normalized = normalizeUrl(raw);

        if (!normalized) {
          markInvalid(item.row);
          markInvalid(item.input);
          markInvalid(linksGroup);
          invalidLinkInput = invalidLinkInput || item.input;
        } else {
          normalizedMap.set(item.key, normalized);
        }
      }

      if (invalidLinkInput) {
        if (!hadGeneratedBefore) output.value = "";
        setStatus("Please enter a valid URL. You may type a full link or a domain like drive.google.com.", "error");
        invalidLinkInput.focus();
        return;
      }

      if (normalizedMap.size === 0) {
        if (!hadGeneratedBefore) output.value = "";

        markInvalid(linksGroup);

        linkItems.forEach((item) => {
          item.toggle.checked = true;
          updateLinkState(item);
          markInvalid(item.row);
        });

        setStatus("Please provide at least 1 link.", "error");
        linkItems[0].input.focus();
        return;
      }

      linkItems.forEach((item) => {
        const normalized = normalizedMap.get(item.key);

        if (normalized) {
          item.input.value = normalized;
        } else {
          item.toggle.checked = false;
        }

        updateLinkState(item);
      });

      const activeLinks = linkItems
        .filter((item) => item.toggle.checked && normalizedMap.has(item.key))
        .map((item) => ({
          key: item.key,
          label: item.label,
          noteWhatsapp: item.noteWhatsapp,
          noteInstagram: item.noteInstagram,
          longUrl: normalizedMap.get(item.key)
        }));

      if (activeLinks.length === 0) {
        if (!hadGeneratedBefore) output.value = "";
        markInvalid(linksGroup);
        setStatus("Please keep at least 1 valid filled link turned ON.", "error");
        return;
      }

      const mode = getMode();

      try {
        setStatus(SHORTENING_ENABLED ? "Shortening links..." : "Generating...", "info");

        const processedLinks = await processLinksBeforeMessage(activeLinks);

        const snapshotLinks = processedLinks.map((item) => ({
          label: item.label,
          noteWhatsapp: item.noteWhatsapp,
          noteInstagram: item.noteInstagram,
          finalUrl: item.finalUrl
        }));

        const message = buildMessageWithFinalUrls({
          title,
          name,
          mode,
          processedLinks: snapshotLinks
        });

        output.value = message;
        hasGenerated = true;
        isDirtyAfterGenerate = false;
        lastGeneratedData = {
          title,
          name,
          processedLinks: snapshotLinks
        };

        const copied = await copyText(message);

        if (copied) {
          setStatus("Generated and copied to clipboard.", "success");
          pulseButton(okBtn, "Copied");
        } else {
          setStatus("Generated, but clipboard access failed. Please copy manually.", "error");
        }
      } catch (error) {
        if (!hadGeneratedBefore) output.value = "";
        setStatus(error.message || "Failed while preparing links.", "error");
      }
    }

    function clearAll() {
      form.reset();
      output.value = "";
      hasGenerated = false;
      lastGeneratedData = null;
      isDirtyAfterGenerate = false;
      setStatus("");
      clearInvalid(titleInput);
      clearInvalid(nameInput);
      clearLinkGroupError();

      linkItems.forEach((item) => {
        item.input.value = "";
        item.toggle.checked = true;
        updateLinkState(item);
      });

      titleInput.focus();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await generateAndCopy();
    });

    form.addEventListener("keydown", (event) => {
      if (
        event.key === "Enter" &&
        event.target.matches('input[type="text"]')
      ) {
        event.preventDefault();
        if (typeof form.requestSubmit === "function") {
          form.requestSubmit();
        } else {
          okBtn.click();
        }
      }
    });

    clearBtn.addEventListener("click", clearAll);

    copyBtn.addEventListener("click", async () => {
      if (!output.value.trim()) {
        setStatus("Generate a message first.", "error");
        return;
      }

      const copied = await copyText(output.value);

      if (copied) {
        setStatus("Copied to clipboard.", "success");
        pulseButton(copyBtn, "Copied");
      } else {
        setStatus("Clipboard access failed. Please copy manually.", "error");
      }
    });

    titleInput.addEventListener("change", () => {
      clearInvalid(titleInput);
      markOutputDirty();
    });

    nameInput.addEventListener("input", () => {
      clearInvalid(nameInput);
      markOutputDirty();
    });

    document.querySelectorAll('input[name="mode"]').forEach((radio) => {
      radio.addEventListener("change", () => {
        regeneratePreviewFromLastGenerated();
      });
    });

    linkItems.forEach((item) => {
      item.toggle.addEventListener("change", () => {
        updateLinkState(item);
        clearLinkGroupError();
        markOutputDirty();
      });

      item.input.addEventListener("input", () => {
        clearInvalid(item.row);
        clearInvalid(item.input);
        clearLinkGroupError();
        markOutputDirty();
      });

      updateLinkState(item);
    });

    clearAll();
  </script>
</body>
</html>
